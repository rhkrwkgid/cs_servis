<html lang="ko">

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
  .site-header{background:var(--card);border-bottom:1px solid var(--bd);padding:0 1.5rem;position:sticky;top:0;z-index:100}
  .header-inner{max-width:680px;margin:0 auto;height:56px;display:flex;align-items:center;justify-content:space-between}
  .logo{display:flex;align-items:center;gap:10px}
  .logo-mark{width:32px;height:32px;background:var(--ac);border-radius:8px;display:flex;align-items:center;justify-content:center}
  .logo-mark svg{width:18px;height:18px}
  .logo-text{font-size:14px;font-weight:700;color:var(--navy)}
  .logo-sub{font-size:11px;color:var(--mu)}
  .prog-pill{font-size:12px;font-weight:500;padding:5px 12px;border-radius:20px;background:var(--ac-l);color:var(--ac-d)}
  .main{max-width:680px;margin:0 auto;padding:1.5rem 1.25rem 5rem}
  .hero-card{border-radius:var(--r);padding:1.75rem;margin-bottom:2rem;position:relative;overflow:hidden}
  .hero-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;margin-bottom:.65rem;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.15);color:rgba(255,255,255,.9)}

  .prog-meta{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.65);margin-bottom:7px}

  .prog-track{height:6px;background:rgba(255,255,255,.18);border-radius:3px;overflow:hidden}
  .prog-fill{height:100%;border-radius:3px;transition:width .4s ease;width:0%}
  .scale-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:.85rem 1rem;margin-bottom:1.5rem}
  .scale-label{font-size:11.5px;color:var(--mu);margin-bottom:.65rem;font-weight:500}
  .scale-row{display:flex;gap:5px}
  .sc-item{flex:1;text-align:center;padding:6px 2px;border-radius:6px;border:0.5px solid}
  .sc-num{font-size:13px;font-weight:700;display:block;margin-bottom:2px}
  .sc-txt{font-size:9.5px;color:var(--mu);line-height:1.35;display:block;white-space:pre-line}
  .sc-item:nth-child(1){background:#FEF0EB;border-color:#E07A5F}.sc-item:nth-child(1) .sc-num{color:#E07A5F}
  .sc-item:nth-child(2){background:#FEF3DC;border-color:#E8A020}.sc-item:nth-child(2) .sc-num{color:#E8A020}
  .sc-item:nth-child(3){background:#F0F4F8;border-color:#7B9BB8}.sc-item:nth-child(3) .sc-num{color:#7B9BB8}
  .sc-item:nth-child(4){background:#E6F5F4;border-color:#2A9D8F}.sc-item:nth-child(4) .sc-num{color:#2A9D8F}

  .cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .cat-nm{font-size:15px;font-weight:700;color:var(--navy)}
  .cat-info{font-size:11.5px;color:var(--mu);padding-left:18px;margin-bottom:.85rem}
  .item-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:.9rem 1rem;margin-bottom:.6rem;box-shadow:0 2px 8px rgba(30,45,64,.05);transition:border-color .2s}
  .item-card.done{border-color:var(--bdm)}
  .item-txt{font-size:13.5px;line-height:1.6;margin-bottom:.75rem}
  .opts{display:flex;gap:5px}
  .opt{flex:1;padding:8px 2px;font-size:10px;font-family:'Noto Sans KR',sans-serif;border-radius:var(--rs);border:0.5px solid var(--bd);background:var(--bg);color:var(--mu);cursor:pointer;text-align:center;min-height:46px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;transition:all .15s;white-space:pre-line}

  .opt-n{font-size:13px;font-weight:700;line-height:1}
  .opt-l{font-size:9px;line-height:1.3}

  .s2{background:#FEF3DC;border-color:#E8A020;color:#8B6010}.s2 .opt-n{color:#E8A020}
  .s3{background:#F0F4F8;border-color:#7B9BB8;color:#3A5570}.s3 .opt-n{color:#7B9BB8}
  .s4{background:#E6F5F4;border-color:#2A9D8F;color:#1A6B60}.s4 .opt-n{color:#2A9D8F}
  .s5{background:#E4F5EC;border-color:#4BB87A;color:#2A7A50}.s5 .opt-n{color:#4BB87A}
  .result-wrap{display:none;animation:fu .4s ease}
  .result-wrap.show{display:block}
  @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .r-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;box-shadow:0 4px 20px rgba(30,45,64,.09)}
  .r-heading{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:600;color:var(--navy);margin-bottom:1.25rem}
  .p-badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 12px;border-radius:20px;margin-bottom:.6rem}
  .p-name{font-size:19px;font-weight:500;color:var(--navy);margin-bottom:.45rem}
  .p-desc{font-size:13px;color:var(--mu);line-height:1.75}
  .dvd{height:1px;background:var(--bd);margin:1.25rem 0}
  .sec-lbl{font-size:12px;font-weight:500;color:var(--mu);margin-bottom:.75rem}
  .srow{display:flex;align-items:center;gap:10px;margin-bottom:.75rem}
  .sname{font-size:12px;color:var(--mu);width:92px;flex-shrink:0;line-height:1.4}
  .strack{flex:1;height:8px;background:var(--bd);border-radius:4px;overflow:hidden}
  .sbar{height:100%;border-radius:4px;transition:width .65s cubic-bezier(.22,1,.36,1)}
  .stag{font-size:10.5px;font-weight:500;width:40px;text-align:right;flex-shrink:0}
  .act-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rs);padding:.9rem 1rem;margin-bottom:.6rem}
  .act-top{display:flex;align-items:center;gap:8px;margin-bottom:.45rem}
  .act-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .act-cat{font-size:12px;font-weight:500;color:var(--navy)}
  .act-lv{font-size:10.5px;font-weight:500;padding:2px 8px;border-radius:10px;margin-left:auto}
  .act-tip{font-size:12.5px;color:var(--mu);line-height:1.7;border-left:2px solid var(--bdm);padding-left:.75rem}
  .all-good{background:var(--bg);border-radius:var(--rs);padding:1rem;font-size:13px;color:var(--mu);line-height:1.6;text-align:center}
  .sub-wrap{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(to top,var(--bg) 70%,transparent);padding:1.25rem 1.25rem 1.5rem}
  @media(min-width:680px){.sub-wrap{left:50%;transform:translateX(-50%);width:680px}}
  .sub-btn{width:100%;padding:14px;color:#fff;border:none;border-radius:var(--rs);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:background .2s}
  .sub-btn:disabled{background:var(--bdm);color:var(--lt);cursor:not-allowed;box-shadow:none}
  .cnt-txt{text-align:center;font-size:12px;color:var(--mu);margin-top:.5rem}
  .reset-btn{width:100%;padding:12px;background:transparent;color:var(--mu);border:1px solid var(--bd);border-radius:var(--rs);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:.75rem}
  .footer{text-align:center;padding:2.5rem 0 1rem;font-size:12px;color:var(--lt);line-height:1.8}
  @media(max-width:480px){.hero-title{font-size:20px}.opt{min-height:44px}}

</style>
</head>

  {n:'5',lbl:'항상\n자연스러워',cls:'s5',score:5,tag:'숙련',  tagBg:'#E4F5EC',tagCol:'#2A7A50'},
];
const PROFILES=[
  {min:4.3,badge:'마스터 셀러',bg:'#E4F5EC',col:'#2A7A50',name:'거의 모든 행동이 몸에 배어 있어요',desc:'의식하지 않아도 자연스럽게 되는 단계예요. 오늘 교육에서는 왜 이게 효과 있는지를 언어화하고, 팀원에게 전파하는 것을 목표로 해보세요.'},
  {min:3.4,badge:'숙련 셀러',bg:'#E6F5F4',col:'#1A6B60',name:'전반적으로 잘 하고 있어요',desc:'자주 하고 있지만 어색함이 남아 있는 영역이 있어요. 반복이 어색함을 없애줘요. 오늘 교육에서 확신을 얻어가세요.'},
  {min:2.5,badge:'성장 중인 셀러',bg:'#E6F1FB',col:'#0C447C',name:'알고 있지만 실행이 아직 고르지 않아요',desc:'가끔 하는 것과 항상 하는 것 사이의 간극을 줄이는 게 목표예요. 루틴으로 만드는 방법을 오늘 교육에서 찾아가세요.'},
  {min:1.7,badge:'입문 셀러',bg:'#FEF3DC',col:'#8B6010',name:'알고는 있지만 실행이 아직 어색해요',desc:'인지와 행동 사이의 간격이 있는 단계예요. 오늘 교육에서 이렇게 하면 되는구나라는 확신 하나를 가져가세요.'},
  {min:0,badge:'시작 단계',bg:'#FEF0EB',col:'#8C3D26',name:'아직 낯선 것들이 많아요 — 딱 좋은 타이밍이에요',desc:'처음 접하는 것들이 많은 단계예요. 오늘 교육에서 딱 한 가지만 내일 바로 써보는 것을 목표로 해요.'},
];
const ans={},TOTAL=CATS.reduce((a,c)=>a+c.items.length,0);
function upd(){
  const d=Object.keys(ans).length,pct=Math.round(d/TOTAL*100);
  document.getElementById('pf').style.width=pct+'%';
  document.getElementById('pp').textContent=pct+'%';
  document.getElementById('hp').textContent=d+' / '+TOTAL;
  document.getElementById('ct').textContent=d+'개 응답됨 · '+TOTAL+'개 중';
  document.getElementById('sb').disabled=d<TOTAL;
}
function build(){
  const wrap=document.getElementById('cl');wrap.innerHTML='';
  CATS.forEach(cat=>{
    const sec=document.createElement('div');sec.className='cat-sec';
    sec.innerHTML='<div class="cat-hd"><div class="cat-dot" style="background:'+cat.color+'"></div><div class="cat-nm">'+cat.label+'</div></div><div class="cat-info">'+cat.info+'</div>';
    cat.items.forEach((q,i)=>{
      const key=cat.id+'_'+i,card=document.createElement('div');
      card.className='item-card';card.id='ic_'+key;
      card.innerHTML='<div class="item-txt">'+q+'</div><div class="opts" id="op_'+key+'"></div>';
      sec.appendChild(card);
      setTimeout(()=>{
        const row=document.getElementById('op_'+key);
        OPTS.forEach(o=>{
          const b=document.createElement('button');b.className='opt';
          b.innerHTML='<span class="opt-n">'+o.n+'</span><span class="opt-l">'+o.lbl+'</span>';
          b.onclick=()=>{
            row.querySelectorAll('.opt').forEach(x=>x.className='opt');
            b.className='opt '+o.cls;ans[key]=o.score;
            document.getElementById('ic_'+key).classList.add('done');upd();
          };
          row.appendChild(b);
        });
      },0);
    });
    wrap.appendChild(sec);
  });
}
document.getElementById('sb').addEventListener('click',()=>{
  const rw=document.getElementById('rw');rw.classList.add('show');
  document.getElementById('sw').style.display='none';
  const sr=document.getElementById('sr');sr.innerHTML='';
  let tot=0;const cd=[];
  CATS.forEach(cat=>{
    const keys=cat.items.map((_,i)=>cat.id+'_'+i);
    const sum=keys.reduce((a,k)=>a+(ans[k]||0),0);
    const avg=sum/keys.length;tot+=avg;
    const pct=Math.round((avg-1)/4*100);
    const opt=OPTS[Math.min(Math.round(avg)-1,4)];
    cd.push({...cat,avg,pct,opt});
    const row=document.createElement('div');row.className='srow';
    row.innerHTML='<div class="sname">'+cat.label+'</div><div class="strack"><div class="sbar" style="width:0%;background:'+cat.color+'" data-p="'+pct+'"></div></div><div class="stag" style="color:'+opt.tagCol+'">'+opt.tag+'</div>';
    sr.appendChild(row);
  });
  setTimeout(()=>sr.querySelectorAll('.sbar').forEach(b=>b.style.width=b.dataset.p+'%'),80);
  const avg=tot/CATS.length;
  const prof=PROFILES.find(p=>avg>=p.min)||PROFILES[PROFILES.length-1];
  const pb=document.getElementById('pb');pb.textContent=prof.badge;pb.style.background=prof.bg;pb.style.color=prof.col;
  document.getElementById('pn').textContent=prof.name;document.getElementById('pd').textContent=prof.desc;
  const weak=cd.filter(c=>c.avg<4.5);
  const al=document.getElementById('al'),ac=document.getElementById('ac');ac.innerHTML='';
  if(!weak.length){ac.innerHTML='<div class="all-good">모든 영역이 자연스러운 수준이에요.<br>오늘 교육에서는 언어화와 팀 전파에 집중해 보세요.</div>';}
  else{
    al.style.display='block';
    weak.forEach(c=>{
      const ti=Math.min(Math.round(c.avg)-1,c.tips.length-1);
      const tip=c.tips[ti];if(!tip)return;
      const o=OPTS[ti];
      const div=document.createElement('div');div.className='act-card';
      div.innerHTML='<div class="act-top"><div class="act-dot" style="background:'+c.color+'"></div><div class="act-cat">'+c.label+'</div><div class="act-lv" style="background:'+o.tagBg+';color:'+o.tagCol+'">'+o.tag+'</div></div><div class="act-tip">'+tip+'</div>';
      ac.appendChild(div);
    });
  }
  rw.scrollIntoView({behavior:'smooth'});
});
document.getElementById('rb').addEventListener('click',()=>{
  Object.keys(ans).forEach(k=>delete ans[k]);
  document.getElementById('rw').classList.remove('show');
  document.getElementById('sw').style.display='block';
  build();upd();window.scrollTo({top:0,behavior:'smooth'});
});
build();upd();

</script>
</body>
</html>
